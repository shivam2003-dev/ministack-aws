version: '3.8'

services:
  postgres-rds:
    image: postgres:15-alpine
    container_name: postgres-rds-local
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=pg_trgm"
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - postgres-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  postgres-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
